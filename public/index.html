<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product CRM Manager - Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 6px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }

        .result pre {
            margin-top: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }

        .api-status {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .api-status.online {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .api-status.offline {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Product CRM Manager</h1>
        <p class="subtitle">Test Interface - Create Product Issue Reports</p>

        <div id="apiStatus" class="api-status">
            Checking API status...
        </div>

        <form id="reportForm">
            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" required>
                    <option value="">Select a category</option>
                    <option value="Appliance">Appliance</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Tools">Tools</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="make">Make/Brand *</label>
                <input type="text" id="make" placeholder="e.g., Samsung, LG, Apple" required>
            </div>

            <div class="form-group">
                <label for="model">Model *</label>
                <input type="text" id="model" placeholder="e.g., RF28R7351SR" required>
            </div>

            <div class="form-group">
                <label for="modelNumber">Serial Number (optional)</label>
                <input type="text" id="modelNumber" placeholder="e.g., SN123456789">
            </div>

            <div class="form-group">
                <label for="issue">Issue Description *</label>
                <textarea id="issue" placeholder="Describe the problem in detail..." required></textarea>
            </div>

            <div class="form-group">
                <label for="address">Address *</label>
                <input type="text" id="address" placeholder="e.g., 123 Main Street, San Francisco, CA 94102" required>
            </div>

            <div class="form-group">
                <label for="userId">User ID (optional)</label>
                <input type="text" id="userId" placeholder="Leave blank for default test user">
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="shareAddress">
                    <label for="shareAddress" style="margin: 0;">Share full address publicly</label>
                </div>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="shareModelNumber">
                    <label for="shareModelNumber" style="margin: 0;">Share serial number publicly</label>
                </div>
            </div>

            <button type="submit">Create Report</button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';

        // Check API status on page load
        async function checkAPIStatus() {
            const statusEl = document.getElementById('apiStatus');
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                if (data.status === 'ok') {
                    statusEl.className = 'api-status online';
                    statusEl.innerHTML = '✅ API is online and ready';
                } else {
                    throw new Error('API returned unexpected status');
                }
            } catch (error) {
                statusEl.className = 'api-status offline';
                statusEl.innerHTML = '❌ API is offline. Make sure the server is running on port 3000.';
            }
        }

        // Handle form submission
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const resultEl = document.getElementById('result');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Report...';

            // Gather form data
            const formData = {
                category: document.getElementById('category').value,
                make: document.getElementById('make').value,
                model: document.getElementById('model').value,
                modelNumber: document.getElementById('modelNumber').value || undefined,
                issue: document.getElementById('issue').value,
                address: document.getElementById('address').value,
                userId: document.getElementById('userId').value || undefined,
                shareFullAddress: document.getElementById('shareAddress').checked,
                shareModelNumber: document.getElementById('shareModelNumber').checked
            };

            // Remove undefined fields
            Object.keys(formData).forEach(key => {
                if (formData[key] === undefined) delete formData[key];
            });

            try {
                const response = await fetch(`${API_BASE}/api/reports`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    resultEl.className = 'result success';
                    resultEl.innerHTML = `
                        <strong>✅ Report Created Successfully!</strong>
                        <p>Report ID: <strong>${data.reportId}</strong></p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;

                    // Reset form
                    e.target.reset();
                } else {
                    throw new Error(data.message || 'Failed to create report');
                }
            } catch (error) {
                resultEl.className = 'result error';
                resultEl.innerHTML = `
                    <strong>❌ Error Creating Report</strong>
                    <p>${error.message}</p>
                    <p>Make sure:</p>
                    <ul>
                        <li>The API server is running (npm start)</li>
                        <li>Firebase is configured correctly</li>
                        <li>Google Maps API key is set</li>
                    </ul>
                `;
            } finally {
                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Report';
            }
        });

        // Check API status on page load
        checkAPIStatus();
    </script>
</body>
</html>
