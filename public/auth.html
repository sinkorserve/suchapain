<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Product CRM Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        #recaptcha-container {
            margin: 20px 0;
        }

        .phone-help {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .link:hover {
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>🔐 Sign In</h1>
        <p class="subtitle">Secure authentication required</p>

        <div class="tabs">
            <button class="tab active" data-tab="phone">Phone Number</button>
            <button class="tab" data-tab="email">Email</button>
        </div>

        <!-- Phone Authentication Tab -->
        <div class="tab-content active" id="phone-tab">
            <div id="phone-signin-form">
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="+1 234 567 8900" required>
                    <p class="phone-help">Include country code (e.g., +1 for US)</p>
                </div>
                <div id="recaptcha-container"></div>
                <button id="sendCodeBtn">Send Verification Code</button>
            </div>

            <div id="phone-verify-form" style="display: none;">
                <div class="form-group">
                    <label for="verificationCode">Verification Code</label>
                    <input type="text" id="verificationCode" placeholder="123456" required>
                </div>
                <button id="verifyCodeBtn">Verify Code</button>
                <p style="text-align: center; margin-top: 10px;">
                    <a href="#" class="link" id="resendCode">Resend Code</a>
                </p>
            </div>
        </div>

        <!-- Email Authentication Tab -->
        <div class="tab-content" id="email-tab">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button id="emailSignInBtn">Sign In</button>

            <div class="divider">or</div>

            <button id="emailSignUpBtn" style="background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);">
                Create Account
            </button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // NOTE: You need to add your Firebase config here
        // Get this from Firebase Console > Project Settings > Web App

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import {
            getAuth,
            signInWithPhoneNumber,
            RecaptchaVerifier,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const API_BASE = 'http://localhost:3000';


        const firebaseConfig = {
            apiKey: "DUMMY",
            authDomain: "suchapain.firebaseapp.com",
            projectId: "suchapain",
            storageBucket: "TESTp",
            messagingSenderId: "406742756489",
            appId: "hehehehehe"
        };

        // Fetch Firebase config from server (keeps credentials in .env, safe to push to GitHub)
        let app, auth;

        async function initializeFirebase() {
            try {
                const response = await fetch(`${API_BASE}/api/firebase-config`);
                const firebaseConfig = await response.json();

                // Initialize Firebase with config from server
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);

                console.log('✓ Firebase initialized successfully');
                return true;
            } catch (error) {
                console.error('✗ Failed to initialize Firebase:', error);
                showMessage('Failed to connect to server. Make sure the server is running.', 'error');
                return false;
            }
        }

        // Initialize Firebase when page loads
        await initializeFirebase();

        let confirmationResult = null;
        let recaptchaVerifier = null;

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;

                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(`${tabName}-tab`).classList.add('active');
            });
        });

        // Initialize reCAPTCHA
        function initRecaptcha() {
            if (!recaptchaVerifier) {
                recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                    size: 'normal',
                    callback: () => {
                        console.log('reCAPTCHA solved');
                    }
                });
                recaptchaVerifier.render();
            }
        }

        // Show message
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        // Phone Authentication
        document.getElementById('sendCodeBtn').addEventListener('click', async () => {
            const phoneNumber = document.getElementById('phoneNumber').value;

            if (!phoneNumber) {
                showMessage('Please enter a phone number', 'error');
                return;
            }

            try {
                initRecaptcha();
                showMessage('Sending verification code...', 'info');

                confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, recaptchaVerifier);

                document.getElementById('phone-signin-form').style.display = 'none';
                document.getElementById('phone-verify-form').style.display = 'block';
                showMessage('Verification code sent! Check your phone.', 'success');
            } catch (error) {
                console.error('Error sending code:', error);
                showMessage(`Error: ${error.message}`, 'error');
            }
        });

        document.getElementById('verifyCodeBtn').addEventListener('click', async () => {
            const code = document.getElementById('verificationCode').value;

            if (!code) {
                showMessage('Please enter the verification code', 'error');
                return;
            }

            try {
                showMessage('Verifying code...', 'info');
                const result = await confirmationResult.confirm(code);

                // Get ID token
                const idToken = await result.user.getIdToken();

                // Store token
                localStorage.setItem('authToken', idToken);
                localStorage.setItem('userPhone', result.user.phoneNumber);

                showMessage('Sign in successful! Redirecting...', 'success');

                // Redirect to main page
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } catch (error) {
                console.error('Error verifying code:', error);
                showMessage(`Error: ${error.message}`, 'error');
            }
        });

        // Email Sign In
        document.getElementById('emailSignInBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('Please enter email and password', 'error');
                return;
            }

            try {
                showMessage('Signing in...', 'info');
                const result = await signInWithEmailAndPassword(auth, email, password);

                const idToken = await result.user.getIdToken();
                localStorage.setItem('authToken', idToken);
                localStorage.setItem('userEmail', result.user.email);

                showMessage('Sign in successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } catch (error) {
                console.error('Error signing in:', error);
                showMessage(`Error: ${error.message}`, 'error');
            }
        });

        // Email Sign Up
        document.getElementById('emailSignUpBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('Please enter email and password', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            try {
                showMessage('Creating account...', 'info');
                const result = await createUserWithEmailAndPassword(auth, email, password);

                const idToken = await result.user.getIdToken();
                localStorage.setItem('authToken', idToken);
                localStorage.setItem('userEmail', result.user.email);

                showMessage('Account created! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } catch (error) {
                console.error('Error creating account:', error);
                showMessage(`Error: ${error.message}`, 'error');
            }
        });

        // Resend code
        document.getElementById('resendCode').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('phone-verify-form').style.display = 'none';
            document.getElementById('phone-signin-form').style.display = 'block';
            showMessage('Enter your phone number again to resend code', 'info');
        });
    </script>
</body>
</html>
